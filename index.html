<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cierre de Pedidos</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 40px 20px;
  }
     body > *:not(.clouds-bg) {
    position: relative;
    z-index: 2;
  }
  

  h1 {
    text-align: center;
    font-size: 48px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 40px;
    font-weight: 700
  }

  h1 span {
    display: block;
    width: 40px;
    height: 2px;
    background: #e74c3c;
    margin: 12px auto 0;
  }

  .card {
    max-width: 900px;
    margin: 0 auto 20px;
    background: #1a1a1a;
    border-left: 3px solid #e74c3c;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .card-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    min-width: 140px;
    
  }
  .card-name a {
    color: #fff;
    text-decoration: none;
  }

  .card-name a:hover {
    text-decoration: underline;
  }

  .timer {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .unit {
    text-align: center;
  }

  .num {
    display: block;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    min-width: 52px;
    background: #111;
    padding: 8px 4px;
    text-align: center;
  }

  .lbl {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    color: #666;
    text-transform: uppercase;
    margin-top: 5px;
  }

  .sep {
    font-size: 28px;
    color: #e74c3c;
    font-weight: 700;
    padding-bottom: 18px;
  }

  .done-tag {
    font-size: 11px;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
  }

  @media (max-width: 500px) {
    .card { flex-direction: column; align-items: flex-start; gap: 14px; }
    .num { font-size: 26px; min-width: 42px; }
  }
.clouds-bg {
  position: fixed;
  inset: 0;
  opacity: 0.6;
  z-index: 0;
  pointer-events: none;
  background-image: url('fondonubes.png');
  background-repeat: repeat-x;
  background-size: auto 100%;
  animation: slideBg 40s linear infinite;
}

@keyframes slideBg {
  from { background-position: 0 0; }
  to   { background-position: 2000px 0; }
}
</style>
</head>
<body>
 
  <div class="clouds-bg"> </div>

<h1>CIERRE DE PEDIDOS <span></span></h1>

<!-- ============================================
     name: nombre del 
     date: "YYYY-MM-DDTHH:MM"  ← fecha y hora local esta en arg
     ============================================ -->
<script>
  var EVENTOS = [
    { name: "CIERRE POKEMON TCG: MEGA MOONLIT TIN CASE", date: "2026-04-05T20:30:00-03:00",url: ""  },
    { name: "CIERRE POKEMON TCG: LUMIOSE CITY MINI TIN DISPLAY", date: "2026-04-05T20:30:00-03:00",url: ""  },
    { name: "CIERRE POKEMON TCG:FIRST PARTNER ILUSTRATION COLLECTION ", date: "2026-04-15T20:30:00-03:00",url: ""  },
    { name: "CIERRE MARVEL",  date: "2026-05-10T20:30:00-03:00", url:"https://docs.google.com/forms/d/e/1FAIpQLSf8HmV5yWdMM9bva8tXQ5uefyJPW7J5V_ftoWlHG-3l_yvM2Q/viewform" },
    { name: "CIERRE RIFTBOUND VENDETTA", date: "2026-05-28T20:30:00-03:00",url: ""  },
  

  ];
</script>
<!-- ============================================ -->

<script>
  function pad(n) { return ('0' + Math.max(0, n)).slice(-2); }

  function build() {
    EVENTOS.forEach(function(ev, i) {
      var card = document.createElement('div');
      card.className = 'card';
      card.id = 'card' + i;
      card.innerHTML =
        '<div class="card-name">' + (ev.url ? '<a href="' + ev.url + '">' + ev.name + '</a>' : ev.name) + '</div>'+
        '<div class="timer">' +
          '<div class="unit"><span class="num" id="d' + i + 'd">00</span><span class="lbl">Días</span></div>' +
          '<span class="sep">:</span>' +
          '<div class="unit"><span class="num" id="d' + i + 'h">00</span><span class="lbl">Horas</span></div>' +
          '<span class="sep">:</span>' +
          '<div class="unit"><span class="num" id="d' + i + 'm">00</span><span class="lbl">Min</span></div>' +
          '<span class="sep">:</span>' +
          '<div class="unit"><span class="num" id="d' + i + 's">00</span><span class="lbl">Seg</span></div>' +
        '</div>' +
        '<span class="done-tag" id="done' + i + '" style="display:none">Cerrado</span>';
      document.body.appendChild(card);
    });
  }

  function tick() {
    var now = Date.now();
    EVENTOS.forEach(function(ev, i) {
      var diff = Math.max(0, new Date(ev.date).getTime() - now);
      document.getElementById('d' + i + 'd').textContent = pad(Math.floor(diff / 86400000));
      document.getElementById('d' + i + 'h').textContent = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById('d' + i + 'm').textContent = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById('d' + i + 's').textContent = pad(Math.floor((diff % 60000) / 1000));
      if (diff === 0) document.getElementById('done' + i).style.display = 'inline';
    });
  }

  build();
  tick();
  setInterval(tick, 1000);
</script>
<div style="text-align:center; margin-top:50px;">
  <img src="logo.png" alt="Doki Doki" style="width:220px; mix-blend-mode:lighten;" />
</div>

</body>
</html>
